name: CI

# Runner-free Connect IQ CI: everything runs on stock GitHub-hosted
# ubuntu-latest. The Garmin SDK is NOT downloaded — the SDK-dependent jobs run
# inside a pre-built Connect IQ Docker image as the job `container`, so there is
# no self-hosted runner and no SDK install step. See docs/CI.md.

on:
  push:
    branches: [main]
    # Skip CI on pushes that only touch listing assets or docs — they can't
    # break the build. (Build artifacts like bin/ and *.prg/*.iq are gitignored,
    # so they never land in a commit in the first place.)
    paths-ignore:
      - 'store/**'
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE'
  # No paths-ignore on pull_request ON PURPOSE: a required status check must
  # post a result on EVERY PR, or "Require branches to be up to date" blocks
  # merges forever when a PR happens to touch only ignored paths.
  pull_request: {}

# One in-flight run per ref; a new push cancels the previous run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only reads the repo. No write scopes are needed to
# compile, and none are granted.
permissions:
  contents: read

# The SDK container is pinned by digest in each job's `container.image` below.
# v2.8.0 = Connect IQ SDK 9.2.0; the digest IS the pin, the tag is a comment.
# (`container.image` can't read workflow `env`, so the digest lives inline —
#  keep the two copies in sync when bumping. See docs/CI.md.)
jobs:
  # 1) Runner-free manifest sanity check. A bad/placeholder app id still
  #    compiles and still passes tests, but the store rejects it — the SDK jobs
  #    cannot catch that class, so this tiny check does.
  manifest-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Validate manifest app id and shape
        # Also cross-checks scripts/list_devices.sh (used by the container build
        # jobs) against the XML parse, so a device-extractor divergence fails here.
        run: python3 scripts/check_manifest_appid.py manifest.xml

  # 2) Compile the unit-test build for EVERY manifest device in ONE job, so the
  #    SDK image is pulled once (not once per device via a matrix). A per-device
  #    rc is collected; the job fails if any single device fails to compile.
  compile-unit-test:
    runs-on: ubuntu-latest
    container:
      # Digest is single-sourced via the &ciq_image YAML anchor and aliased in
      # release-build, so a bump can't leave the two jobs on different SDKs.
      image: &ciq_image ghcr.io/matco/connectiq-tester@sha256:7a6f586cb0e0393ff288da09cf27b6dad40a0058a346c529b99fd0fc19858f0f # v2.8.0 = SDK 9.2.0
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Don't leave GITHUB_TOKEN in .git/config inside the third-party container.
          persist-credentials: false

      - name: Resolve SDK toolchain onto PATH
        shell: bash
        run: |
          set -euo pipefail
          # The image is meant to put monkeyc on PATH; if a future tag doesn't,
          # find it and register the dir both for this step and later steps.
          if ! command -v monkeyc >/dev/null 2>&1; then
            for d in /connectiq /opt/connectiq /root/connectiq /sdk /opt/garmin; do
              b=$(find "$d" -name monkeyc -type f 2>/dev/null | head -1 || true)
              if [ -n "$b" ]; then
                dir="$(dirname "$b")"
                echo "$dir" >> "$GITHUB_PATH"   # subsequent steps
                export PATH="$dir:$PATH"        # this step's assertion
                break
              fi
            done
          fi
          command -v monkeyc
          monkeyc --version || true

      - name: Generate a throwaway developer key
        shell: bash
        run: |
          set -euo pipefail
          # monkeyc requires a developer key even for a test build. This key is
          # generated per job, never committed, and never a repo secret — a
          # store-submittable .iq needs the account-bound key, which is a
          # release step CI deliberately does not perform.
          openssl genrsa -out developer_key.pem 4096
          openssl pkcs8 -topk8 -inform PEM -outform DER \
            -in developer_key.pem -out developer_key.der -nocrypt

      - name: Compile --unit-test for every manifest device
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p bin
          # Fail-closed device enumeration. Capture the list and assert it is
          # non-empty BEFORE looping: `list_devices.sh` exits non-zero on zero
          # devices, but `done < <(...)` process substitution would swallow that
          # exit code, so we capture-then-check instead of streaming.
          if ! devices="$(sh scripts/list_devices.sh)"; then
            echo "::error::device enumeration failed"; exit 1
          fi
          count=$(printf '%s\n' "$devices" | grep -c . || true)
          if [ "$count" -eq 0 ]; then
            echo "::error::no devices to compile — refusing to pass green"; exit 1
          fi
          echo "Compiling --unit-test for $count device(s)."
          rc_total=0
          failed=""
          # -w raises warnings but does NOT fail the build: this codebase is
          # intentionally untyped, so no -l typecheck level is passed and the
          # only failure signal is a non-zero monkeyc exit.
          while read -r dev; do
            [ -z "$dev" ] && continue
            echo "::group::compile (unit-test) $dev"
            if monkeyc -f monkey.jungle \
                       -o "bin/StrongRow-test-$dev.prg" \
                       -y developer_key.der \
                       -d "$dev" \
                       --unit-test -w; then
              echo "$dev: OK"
            else
              rc=$?
              echo "::error::$dev failed monkeyc (rc=$rc)"
              failed="$failed $dev"
              rc_total=1
            fi
            echo "::endgroup::"
          done <<< "$devices"
          if [ -n "$failed" ]; then
            echo "Devices that failed to compile:$failed"
          fi
          exit $rc_total

  # 3) release-build: compile the NON-unit-test RELEASE artifact (the build that
  #    actually ships) for every device, then export the store .iq package.
  #    monkeyc exits non-zero if a device's static image blows its memory limit,
  #    so a non-zero exit is the assertion — the per-device compile IS the gate.
  release-build:
    runs-on: ubuntu-latest
    container:
      image: *ciq_image # same digest as compile-unit-test (v2.8.0 = SDK 9.2.0)
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Resolve SDK toolchain onto PATH
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v monkeyc >/dev/null 2>&1; then
            for d in /connectiq /opt/connectiq /root/connectiq /sdk /opt/garmin; do
              b=$(find "$d" -name monkeyc -type f 2>/dev/null | head -1 || true)
              if [ -n "$b" ]; then
                dir="$(dirname "$b")"
                echo "$dir" >> "$GITHUB_PATH"
                export PATH="$dir:$PATH"
                break
              fi
            done
          fi
          command -v monkeyc
          monkeyc --version || true

      - name: Generate a throwaway developer key
        shell: bash
        run: |
          set -euo pipefail
          openssl genrsa -out developer_key.pem 4096
          openssl pkcs8 -topk8 -inform PEM -outform DER \
            -in developer_key.pem -out developer_key.der -nocrypt

      - name: Compile the release .prg for every device
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p bin
          # Fail-closed device enumeration (see compile-unit-test for rationale).
          if ! devices="$(sh scripts/list_devices.sh)"; then
            echo "::error::device enumeration failed"; exit 1
          fi
          count=$(printf '%s\n' "$devices" | grep -c . || true)
          if [ "$count" -eq 0 ]; then
            echo "::error::no devices to build — refusing to pass green"; exit 1
          fi
          echo "Release-compiling $count device(s)."
          rc_total=0
          failed=""
          while read -r dev; do
            [ -z "$dev" ] && continue
            echo "::group::release compile $dev"
            if monkeyc -f monkey.jungle \
                       -o "bin/StrongRow-$dev.prg" \
                       -y developer_key.der \
                       -d "$dev" -w; then
              echo "$dev: OK"
            else
              rc=$?
              echo "::error::$dev release compile failed (rc=$rc)"
              failed="$failed $dev"
              rc_total=1
            fi
            echo "::endgroup::"
          done <<< "$devices"
          if [ -n "$failed" ]; then
            echo "Devices that failed release compile:$failed"
          fi
          exit $rc_total

      - name: Export the store package (.iq)
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::export StrongRow.iq"
          # NOTE: this .iq is signed with the per-job THROWAWAY key, so it is a
          # structurally valid package that proves the export path compiles — it
          # is NOT store-submittable. A real submission must be re-signed with the
          # account-bound developer key (a manual release step, not done in CI).
          monkeyc -e -f monkey.jungle \
                  -o "bin/StrongRow.iq" \
                  -y developer_key.der -w
          echo "::endgroup::"
          ls -l bin/StrongRow.iq

      - name: Upload build artifacts (.prg + .iq, throwaway-signed)
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          # Throwaway-signed: a CI build sanity artifact, not a store upload.
          name: strongrow-build-unsigned
          path: |
            bin/*.prg
            bin/*.iq
          if-no-files-found: error

  # 4) Single stable status name to require in branch protection. Add new
  #    required jobs to `needs` here rather than to branch protection.
  #
  #    `if: always()` matters: with the default `if: success()`, a failing
  #    upstream job would SKIP this job — and branch protection treats a skipped
  #    required check as SATISFIED, silently letting a red build merge. Running
  #    always and asserting every dependency succeeded makes THIS job fail (not
  #    skip) on any upstream failure/cancel/skip, so it truly gates the merge.
  ci-required:
    if: ${{ always() }}
    needs: [manifest-lint, compile-unit-test, release-build]
    runs-on: ubuntu-latest
    steps:
      - name: Fail unless every required job succeeded
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
        run: |
          echo "::error::A required job did not succeed:"
          echo "  manifest-lint     = ${{ needs.manifest-lint.result }}"
          echo "  compile-unit-test = ${{ needs.compile-unit-test.result }}"
          echo "  release-build     = ${{ needs.release-build.result }}"
          exit 1
      - name: All required CI jobs passed
        run: echo "manifest-lint + compile-unit-test + release-build all succeeded."
